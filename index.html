<!doctype html>
<html lang="en" class="w-full h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMU Insurance Clinic Map</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" crossorigin="">
    </link>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"
        crossorigin="">
    </link>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js" crossorigin=""></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Material Icons -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />

    <script src="modules/index.js" type="module"></script>
</head>

<body class="w-full h-full">
    <div id="map" class="w-full h-full"></div>

    <!-- Filters -->
    <div class="fixed left-14 top-3 z-500 flex flex-row space-x-2">
        <button id="btn-toggle-open" class="rounded bg-white p-2 box-border cursor-pointer flex items-center">
            <span class="material-symbols-rounded mr-2">acute</span>
            Open Now
        </button>
        <!-- <button class="rounded bg-white p-2 box-border cursor-pointer flex items-center">
            <span class="material-symbols-rounded mr-2">calendar_clock</span>
            Open...
        </button> -->
    </div>

    <!-- Clinics Last Updated Status -->
    <div class="fixed left-0 bottom-0 z-500 text-xs p-1 bg-white">
        <p>clinics.json last updated <span id="last-updated"></span></p>
    </div>

    <!-- My Location Button -->
    <button id="my_location_button"
        class="fixed right-4 bottom-6 z-500 rounded bg-white w-10 h-10 flex justify-center items-center cursor-pointer">
        <span id="my_location" class="material-symbols-rounded">my_location</span>
    </button>

    <!-- Template for marker popups -->
    <template id="popup-template">
        <div>
            <b class="clinic-name"></b>
            <div class="flex flex-row items-center mt-2 hover:bg-gray-100">
                <span class="material-symbols-rounded mr-2">location_on</span>
                <a class="clinic-address" target="_blank"></a>
            </div>
            <div class="flex flex-row items-center mt-2 hover:bg-gray-100">
                <span class="material-symbols-rounded mr-2">call</span>
                <a class="clinic-phone" target="_blank"></a>
            </div>
            <div class="flex flex-row items-center hidden"><span class="material-symbols-rounded mr-2">info</span>
                <p class="clinic-remarks"></p>
            </div>
            <details class="clinic-oh-container mt-2 pt-2 border-t border-slate-100 hidden group">
                <summary
                    class="mb-1 text-slate-800 flex items-center cursor-pointer select-none list-none [&::-webkit-details-marker]:hidden">
                    <span class="material-symbols-rounded text-base mr-1 transition-transform">schedule</span>
                    <span>Opening Hours</span>
                    <span class="material-symbols-rounded text-xs ml-auto group-open:rotate-180">expand_more</span>
                </summary>

                <div class="clinic-oh-grid grid grid-cols-[max-content_1fr] gap-1 pl-6 text-xs mt-1"></div>
            </details>
        </div>
    </template>
</body>

</html>
