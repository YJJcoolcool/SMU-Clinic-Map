<!doctype html>
<html lang="en" class="w-full h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SMU Insurance Clinic Map</title>

        <!-- Leaflet -->
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
        />
        <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""
            defer
        ></script>

        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- Material Icons -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
        />

        <script src="index.js" defer></script>
    </head>

    <body class="w-full h-full">
        <div id="map" class="w-full h-full"></div>

        <!-- Filters -->
        <div class="fixed left-14 top-3 z-500 flex flex-row space-x-2">
            <button
                class="rounded bg-slate-300 p-2 box-border cursor-pointer flex items-center"
            >
                <span class="material-symbols-rounded mr-2">acute</span>
                Open Now
            </button>
            <button
                class="rounded bg-white p-2 box-border cursor-pointer flex items-center"
            >
                <span class="material-symbols-rounded mr-2"
                    >calendar_clock</span
                >
                Open...
            </button>
        </div>

        <!-- My Location Button -->
        <button
            onclick="findLocation(true)"
            class="fixed right-4 bottom-6 z-500 rounded bg-white w-10 h-10 flex justify-center items-center cursor-pointer"
        >
            <span id="my_location" class="material-symbols-rounded"
                >my_location</span
            >
        </button>
    </body>
</html>
